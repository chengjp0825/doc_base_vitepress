name: NoteHub Auto Deployment

on:
  push:
    branches:
      - main  # 仅在推送到主分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Remote Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 进入定义路径
            cd ~/GITHUB/NoteHub
            
            # 2. 拉取最新代码
            git pull origin main
            
            # 3. 构建镜像 (基于项目内 Dockerfile)
            sudo docker build -t note-hub:latest .
            
            # 4. 滚动更新容器
            # 停止并移除旧容器，-f 确保即使容器不存在也不会报错导致流程中断
            sudo docker rm -f vitepress-site || true
            
            # 5. 启动新容器（严格执行 127.0.0.1 端口绑定策略）
            sudo docker run -d \
              --name vitepress-site \
              -p 127.0.0.1:8080:80 \
              --restart always \
              note-hub:latest
            
            # 6. 验证容器状态
            sudo docker ps -f name=vitepress-site
