# ==============================================================================
# 👑 NoteHub 云端构建与自动化部署 (极致解耦架构版)
# 核心思想：将 Node.js 编译与 Docker 打包分离，实现构建速度与资源占用的双重最优化。
# 维护者：NoteHub程
# ==============================================================================
name: NoteHub Cloud Build & Deploy

# ------------------------------------------------------------------------------
# 🚀 触发器配置 (Triggers)
# ------------------------------------------------------------------------------
on:
  push:
    branches: [ main ] # 监听机制：仅当代码合并或推送到 main 分支时触发生产环境部署
    # paths-ignore:    # 架构师建议：可取消注释以忽略非代码文件的变更，节省 CI 资源
    #   - 'README.md'
    #   - '.vscode/**'

# ------------------------------------------------------------------------------
# 🌐 全局环境变量 (Environment Variables)
# ------------------------------------------------------------------------------
env:
  # 镜像仓库：使用 GitHub 官方的容器注册表 (GitHub Container Registry)
  REGISTRY: ghcr.io 
  # 镜像名称：自动获取 "你的用户名/项目名" (例如 chengjp0825/NoteHub)，保证命名规范
  IMAGE_NAME: ${{ github.repository }} 

# ------------------------------------------------------------------------------
# 🛠️ 任务流定义 (Jobs)
# ------------------------------------------------------------------------------
jobs:
  # ============================================================================
  # 阶段一：构建阶段 (Build)
  # 职责：在 GitHub 宿主机原生环境中编译静态文件，随后打包为轻量级 Nginx 镜像
  # ============================================================================
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的最新干净 Ubuntu 虚拟机
    
    # 权限提权：默认 GHA Token 没有写入包的权限，必须显式声明
    permissions:
      contents: read     # 允许读取代码仓库
      packages: write    # 允许向 GHCR 推送(写入) Docker 镜像

    steps:
      # --- 步骤 1：拉取源码 ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 1 开启浅克隆。我们不需要 Git 历史记录，这能节省几秒的拉取时间。
          # 注意：如果你的 VitePress 需要读取 Git 历史来生成 "最后更新时间"，请将此值改为 0。
          fetch-depth: 1

      # --- 步骤 2：配置极速 Node.js 环境 (提速核心) ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 匹配你依赖树要求的最高 Node 版本，避免 EBADENGINE 警告
          cache: 'npm'       # 自动开启 npm 模块级别的缓存，实现秒级依赖安装

      # --- 步骤 3：原生编译 VitePress 静态产物 ---
      - name: Install dependencies & Build
        run: |
          npm ci              # 严格依据 package-lock.json 安装依赖，保证环境一致性
          npm run build       # 执行 VitePress 打包，产物将生成在 docs/.vitepress/dist
        env:
          # 屏蔽环境变量：强制关闭 Husky。因为我们在纯净的 CI 环境中编译，
          # 不需要执行本地的 git pre-commit 钩子，这能消除找不到 .git 目录的报错。
          HUSKY: 0 
          # 提高 Node 可用堆内存，降低大文档站构建时 OOM 风险。
          NODE_OPTIONS: --max-old-space-size=4096

      # --- 步骤 4：初始化 Docker 高级构建引擎 ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 步骤 5：登录 GitHub 容器镜像仓库 ---
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}         # 触发 Actions 的用户
          password: ${{ secrets.GHCR_TOKEN }}   # 读取项目 Settings -> Secrets 中的 Personal Access Token

      # --- 步骤 6：基于极简 Dockerfile 打包并推送镜像 ---
      # 此时的 Dockerfile 只需要 FROM nginx:alpine 并 COPY dist 目录即可，极为迅速。
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # 构建上下文限定在当前根目录
          push: true # 构建成功后立即推送到云端仓库
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest # 始终覆盖 latest 标签
          
          # 架构级缓存策略：利用 GitHub Actions 原生缓存存储 Docker 层
          # mode=max 表示缓存所有构建步骤的层，最大化降低后续构建的网络和 CPU 消耗
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # 阶段二：部署阶段 (Deploy)
  # 职责：登录远端 Linux 服务器，拉取最新镜像，平滑重启容器
  # ============================================================================
  deploy:
    needs: build # 强依赖：如果 build 阶段失败，deploy 阶段将自动取消，保护生产环境
    runs-on: ubuntu-latest
    steps:
      # --- 步骤 7：通过 SSH 登录宿主机执行更新脚本 ---
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          # 安全守则：严禁明文密码！以下凭证全部从 GitHub Secrets 安全读取
          host: ${{ secrets.REMOTE_HOST }}         # 宿主机 IP (如 1.2.3.4)
          username: ${{ secrets.REMOTE_USER }}     # 登录账户 (推荐非 root 用户配置 sudo 免密，或直接使用 root)
          key: ${{ secrets.SSH_PRIVATE_KEY }}      # SSH 私钥，确保通信加密防中间人攻击
          
          script: |
            # 1. 宿主机身份认证：使用你的 Token 登录 GHCR，确保有权限拉取私有镜像
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. 静默拉取最新镜像：加入 -q 参数隐藏繁杂的下载进度条，防止撑爆 SSH 终端输出缓冲
            sudo docker pull -q ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # 3. 清理旧版本实例：强制删除名为 vitepress-site 的旧容器
            # "|| true" 是一种架构容错设计：即使这是第一次部署(容器不存在)，报错也不会中断脚本执行
            sudo docker rm -f vitepress-site || true
            
            # 4. 启动新版 NoteHub 容器
            sudo docker run -d \
              --name vitepress-site \
              -p 127.0.0.1:8080:80 \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            # 【安全参数解析】: 
            # -p 127.0.0.1:8080:80 强制将容器暴露的 80 端口绑定在宿主机的内网(本地)环回地址。
            # 这意味着外部黑客无法通过 http://IP:8080 直接访问容器，流量必须且只能经过你配置的 Nginx 反向代理与 SSL 卸载。
            
            # 5. 系统瘦身：清理被新镜像顶替下来的悬空(dangling)无用镜像，释放云服务器宝贵的 SSD 空间。
            # 末尾加上 '&' 让其在后台静默运行，不阻塞当前部署流水线的完成状态，让你的 Actions 绿灯亮得更快！
            sudo docker image prune -f &