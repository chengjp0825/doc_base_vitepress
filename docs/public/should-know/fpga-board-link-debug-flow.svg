<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">FPGA 板间 LVDS 调试闭环</title>
  <desc id="desc">从上电、训练、对齐、业务、误码监控到重同步，展示板间通信的调试闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <style>
      .title { font: 700 28px sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
      .state { fill: #0ea5e9; }
      .warn { fill: #f59e0b; }
      .good { fill: #10b981; }
      .fail { fill: #ef4444; }
      .label { font: 700 18px sans-serif; fill: #fff; }
      .small { font: 500 15px sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #0f172a; stroke-width: 4; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <text x="60" y="56" class="title">FPGA 板间通信的调试闭环</text>
  <text x="60" y="90" class="subtitle">先看物理层是否稳定，再看训练状态机是否收敛，最后才看业务帧是否连续。</text>

  <rect x="60" y="160" width="180" height="90" class="box"/>
  <rect x="270" y="160" width="180" height="90" class="box"/>
  <rect x="480" y="160" width="180" height="90" class="box"/>
  <rect x="690" y="160" width="180" height="90" class="box"/>
  <rect x="900" y="160" width="180" height="90" class="box"/>

  <rect x="88" y="182" width="124" height="46" rx="12" class="state"/>
  <text x="108" y="212" class="label">上电稳定</text>
  <rect x="298" y="182" width="124" height="46" rx="12" class="warn"/>
  <text x="318" y="212" class="label">位锁定</text>
  <rect x="508" y="182" width="124" height="46" rx="12" class="warn"/>
  <text x="528" y="212" class="label">字对齐</text>
  <rect x="718" y="182" width="124" height="46" rx="12" class="good"/>
  <text x="738" y="212" class="label">业务态</text>
  <rect x="928" y="182" width="124" height="46" rx="12" class="fail"/>
  <text x="948" y="212" class="label">BER 监控</text>

  <path d="M240 205 L270 205" class="arrow"/>
  <path d="M450 205 L480 205" class="arrow"/>
  <path d="M660 205 L690 205" class="arrow"/>
  <path d="M870 205 L900 205" class="arrow"/>

  <rect x="130" y="320" width="940" height="160" class="box"/>
  <text x="160" y="356" class="small">调试顺序建议</text>
  <text x="160" y="392" class="small">1．先确认供电、参考时钟、复位时序。</text>
  <text x="160" y="424" class="small">2．再看训练序列是否稳定锁定。</text>
  <text x="160" y="456" class="small">3．最后再用 BER、温漂和速率阶梯确认量产边界。</text>
  <path d="M1010 330 C1080 380, 1080 460, 1010 470" class="loop"/>
</svg>