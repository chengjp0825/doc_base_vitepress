<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">LVDS 链路结构</title>
  <desc id="desc">展示 LVDS 发射端、差分对、100欧终端与接收端的链路结构。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fff1f2"/>
    </linearGradient>
    <style>
      .title { font: 700 28px sans-serif; fill: #111827; }
      .subtitle { font: 500 18px sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 22; }
      .tx { fill: #2563eb; }
      .rx { fill: #7c3aed; }
      .mid { fill: #10b981; }
      .wirep { stroke: #111827; stroke-width: 8; fill: none; stroke-linecap: round; }
      .wiren { stroke: #6b7280; stroke-width: 8; fill: none; stroke-linecap: round; }
      .label { font: 600 18px sans-serif; fill: #111827; }
      .small { font: 500 15px sans-serif; fill: #4b5563; }
      .term { stroke: #ef4444; stroke-width: 5; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1200" height="500" fill="url(#bg)"/>
  <text x="60" y="56" class="title">LVDS 链路：恒流驱动 + 100Ω 终端 + 差分判决</text>
  <text x="60" y="90" class="subtitle">这张图把“为什么低摆幅还能稳跑”拆成三段：驱动、通道、终端。</text>

  <rect x="50" y="160" width="220" height="170" class="box"/>
  <rect x="490" y="160" width="220" height="170" class="box"/>
  <rect x="930" y="160" width="220" height="170" class="box"/>

  <text x="110" y="205" class="label">发射端</text>
  <text x="551" y="205" class="label">差分通道</text>
  <text x="992" y="205" class="label">接收端</text>

  <rect x="90" y="230" width="130" height="52" rx="12" class="tx"/>
  <text x="118" y="263" class="label" fill="#fff">恒流源</text>
  <rect x="965" y="230" width="130" height="52" rx="12" class="rx"/>
  <text x="992" y="263" class="label" fill="#fff">比较器</text>

  <path d="M270 230 L470 230" class="wirep"/>
  <path d="M270 282 L470 282" class="wiren"/>
  <path d="M710 230 L910 230" class="wirep"/>
  <path d="M710 282 L910 282" class="wiren"/>

  <rect x="566" y="212" width="68" height="108" rx="16" class="mid"/>
  <text x="582" y="255" class="label" fill="#fff">100Ω</text>
  <text x="578" y="282" class="small" fill="#fff">终端</text>

  <path d="M500 256 L556 256" class="arrow"/>
  <path d="M644 256 L700 256" class="arrow"/>

  <text x="70" y="365" class="small">低摆幅并不等于低可靠性，关键在于判决看差值，噪声看共模。</text>
  <text x="70" y="395" class="small">恒流驱动让终端电压摆动更可控，100Ω 终端则把传输线阻抗收住。</text>
</svg>