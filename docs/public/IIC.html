<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I2C 物理层高级仿真器 (Dark Mode)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root,
        html.theme-light {
            --bg-body: #f6f8fb;
            --bg-panel: #ffffff;
            --bg-input: #f3f4f8;
            --text-main: #1f2937;
            --text-muted: #64748b;
            --accent-pink: #e85c7a;
            --accent-blue: #2563eb;
            --border-color: #d7dce5;
            --error-red: #dc2626;
            --success-green: #16a34a;
            --card-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
            --chart-bg: #f8fafc;
            --chart-grid: #e2e8f0;
            --chart-tick: #64748b;
            --chart-threshold: rgba(15, 23, 42, 0.28);
            --chart-box-bg: rgba(232, 92, 122, 0.12);
            --chart-box-border: rgba(232, 92, 122, 0.4);
        }

        html.theme-dark {
            --bg-body: #17171a;
            --bg-panel: #202026;
            --bg-input: #2a2a32;
            --text-main: #e8e8e8;
            --text-muted: #8c8c9b;
            --accent-pink: #f4a298;
            --accent-blue: #3b5998;
            --border-color: #383843;
            --error-red: #ff5e5e;
            --success-green: #4ade80;
            --card-shadow: 0 10px 40px rgba(0,0,0,0.5);
            --chart-bg: #1a1a20;
            --chart-grid: #2a2a32;
            --chart-tick: #8c8c9b;
            --chart-threshold: rgba(255, 255, 255, 0.3);
            --chart-box-bg: rgba(244, 162, 152, 0.15);
            --chart-box-border: rgba(244, 162, 152, 0.5);
        }

        html,
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.25s ease, color 0.25s ease;
            margin: 0;
            padding: 14px 10px;
            display: flex;
            justify-content: center;
            width: 100%;
            overflow-x: hidden;
        }

        .simulator-card {
            background-color: var(--bg-panel);
            width: 100%;
            max-width: 1000px;
            border-radius: 16px;
            padding: 18px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            transition: background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        /* 顶部信息栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .title-area h1 {
            margin: 0 0 10px 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .error-msg {
            color: var(--error-red);
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
        }

        .stats-grid {
            display: flex;
            gap: 25px;
            text-align: right;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            font-family: monospace;
        }

        /* 图表区 */
        .chart-container {
            position: relative;
            height: 360px;
            width: 100%;
            background-color: var(--chart-bg);
            border-radius: 12px;
            padding: 14px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
            transition: background-color 0.25s ease, border-color 0.25s ease;
        }

        /* 底部控制区 */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 8px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-input);
            padding: 12px 20px;
            border-radius: 8px;
        }

        .control-row label {
            font-size: 14px;
            color: var(--text-muted);
            width: 120px;
        }

        .slider-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--accent-blue);
        }

        .value-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }

        .toggle-group {
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .toggle-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .toggle-btn:hover:not(.active) {
            background: var(--border-color);
        }

        @media (max-width: 900px) {
            body {
                padding: 16px 10px;
            }

            .simulator-card {
                padding: 16px;
                border-radius: 12px;
            }

            .header {
                flex-direction: column;
                gap: 12px;
            }

            .stats-grid {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 10px 14px;
                text-align: left;
            }

            .chart-container {
                height: 300px;
                padding: 12px;
                margin-bottom: 16px;
            }

            .controls {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-bottom: 8px;
            }

            .control-row {
                padding: 10px 12px;
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .control-row label {
                width: auto;
                font-size: 13px;
            }

            .slider-container {
                width: 100%;
                gap: 10px;
            }

            .toggle-group {
                width: 100%;
                flex-wrap: wrap;
            }

            .toggle-btn {
                flex: 1 1 120px;
            }
        }

        @media (max-width: 640px) {
            .chart-container {
                height: 260px;
            }

            .title-area h1 {
                font-size: 18px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>
<body>

<div class="simulator-card">
    <div class="header">
        <div class="title-area">
            <h1>I2C 物理层信号仿真器</h1>
            <div id="errorMsg" class="error-msg"></div>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">上升时间 (TR)</span>
                <span class="stat-value" id="valTr">0 ns</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最大灌电流 (Isink)</span>
                <span class="stat-value" id="valIsink" style="color: var(--accent-pink);">0 mA</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">TR 限制</span>
                <span class="stat-value" id="valLimit">300 ns</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">状态</span>
                <span class="stat-value" id="valStatus">正常</span>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="i2cChart"></canvas>
    </div>

    <div class="controls">
        <div class="control-row">
            <label>上拉电阻 Rp (kΩ)</label>
            <div class="slider-container">
                <input type="range" id="resistor" min="0.5" max="20" step="0.1" value="4.7">
                <div class="value-box" id="resDisplay">4.7</div>
            </div>
        </div>
        <div class="control-row">
            <label>总线电容 Cb (pF)</label>
            <div class="slider-container">
                <input type="range" id="capacitor" min="10" max="400" step="5" value="100">
                <div class="value-box" id="capDisplay">100</div>
            </div>
        </div>
        
        <div class="control-row">
            <label>系统电压 (VDD)</label>
            <div class="toggle-group" id="vddGroup">
                <button class="toggle-btn" data-val="1.8">1.8V</button>
                <button class="toggle-btn" data-val="2.5">2.5V</button>
                <button class="toggle-btn active" data-val="3.3">3.3V</button>
                <button class="toggle-btn" data-val="5.0">5.0V</button>
            </div>
        </div>

        <div class="control-row">
            <label>通信速率</label>
            <div class="toggle-group" id="speedGroup">
                <button class="toggle-btn" data-val="100">100 kHz (标准)</button>
                <button class="toggle-btn active" data-val="400">400 kHz (快速)</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 初始状态变量
    let currentVdd = 3.3;
    let currentSpeed = 400; // kHz
    let chartInstance = null;

    // 获取DOM
    const resSlider = document.getElementById('resistor');
    const capSlider = document.getElementById('capacitor');
    const resDisplay = document.getElementById('resDisplay');
    const capDisplay = document.getElementById('capDisplay');
    const errorMsg = document.getElementById('errorMsg');

    function getCssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function detectDarkTheme() {
        try {
            if (window.parent && window.parent !== window) {
                const parentRoot = window.parent.document.documentElement;
                if (parentRoot) {
                    return parentRoot.classList.contains('dark') || parentRoot.getAttribute('data-theme') === 'dark';
                }
            }
        } catch (e) {
            // 跨域或访问限制时降级到本地检测
        }

        return document.documentElement.classList.contains('dark')
            || window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    function applyTheme(isDark) {
        document.documentElement.classList.toggle('theme-dark', isDark);
        document.documentElement.classList.toggle('theme-light', !isDark);
    }

    function syncTheme() {
        applyTheme(detectDarkTheme());
        if (chartInstance) updateSimulation();
    }

    function setupThemeSync() {
        syncTheme();

        try {
            if (window.parent && window.parent !== window) {
                const parentRoot = window.parent.document.documentElement;
                if (parentRoot) {
                    const observer = new MutationObserver(syncTheme);
                    observer.observe(parentRoot, {
                        attributes: true,
                        attributeFilter: ['class', 'data-theme']
                    });
                }
            }
        } catch (e) {
            // 忽略父页面监听失败
        }

        const media = window.matchMedia('(prefers-color-scheme: dark)');
        if (media.addEventListener) {
            media.addEventListener('change', syncTheme);
        } else if (media.addListener) {
            media.addListener(syncTheme);
        }
    }
    
    // 绑定切换按钮事件
    document.querySelectorAll('#vddGroup .toggle-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('#vddGroup .toggle-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentVdd = parseFloat(e.target.getAttribute('data-val'));
            updateSimulation();
        });
    });

    document.querySelectorAll('#speedGroup .toggle-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('#speedGroup .toggle-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentSpeed = parseInt(e.target.getAttribute('data-val'));
            updateSimulation();
        });
    });

    // 核心仿真逻辑
    function updateSimulation() {
        const Rp_k = parseFloat(resSlider.value);
        const Cb_p = parseFloat(capSlider.value);
        
        resDisplay.innerText = Rp_k;
        capDisplay.innerText = Cb_p;

        const R = Rp_k * 1000;
        const C = Cb_p * 1e-12;
        const tau = R * C;
        
        const VIH = 0.7 * currentVdd;
        const VIL = 0.3 * currentVdd;

        // 计算时间节点
        const t1_sec = -tau * Math.log(1 - 0.3);
        const t2_sec = -tau * Math.log(1 - 0.7);
        const tr_ns = (t2_sec - t1_sec) * 1e9;
        
        const t1_ns = t1_sec * 1e9;
        const t2_ns = t2_sec * 1e9;

        // 计算灌电流 Isink (mA)
        const isink_mA = (currentVdd / Rp_k);

        // 规范判定
        const max_tr = (currentSpeed === 400) ? 300 : 1000;
        document.getElementById('valLimit').innerText = max_tr + " ns";
        document.getElementById('valTr').innerText = tr_ns.toFixed(1) + " ns";
        document.getElementById('valIsink').innerText = isink_mA.toFixed(2) + " mA";

        let statusText = "正常";
        let statusColor = "var(--success-green)";
        errorMsg.innerText = "";

        if (isink_mA > 3.0) {
            statusText = "错误";
            statusColor = "var(--error-red)";
            errorMsg.innerText = "错误: 灌电流过载 (I_sink > 3mA)，芯片无法有效拉低总线电平！";
        } else if (tr_ns > max_tr) {
            statusText = "错误";
            statusColor = "var(--error-red)";
            errorMsg.innerText = "错误: 上升时间超时 (I2C Spec Violation)！";
        }

        const statusEl = document.getElementById('valStatus');
        statusEl.innerText = statusText;
        statusEl.style.color = statusColor;
        document.getElementById('valTr').style.color = (tr_ns > max_tr) ? "var(--error-red)" : "var(--text-main)";
        document.getElementById('valIsink').style.color = (isink_mA > 3.0) ? "var(--error-red)" : "var(--accent-pink)";

        // 生成波形数据
        const timeLabels = [];
        const voltageData = [];
        const maxTime = (currentSpeed === 400) ? 1500 : 5000;
        const holdTime = maxTime * 0.7; // 保持高电平的时间点，之后模拟拉低

        for (let t_ns = 0; t_ns <= maxTime; t_ns += maxTime/200) {
            timeLabels.push(t_ns);
            if (t_ns < holdTime) {
                // 充电曲线
                voltageData.push(currentVdd * (1 - Math.exp(-(t_ns * 1e-9) / tau)));
            } else if (t_ns < holdTime + 20) {
                // 极速拉低 (芯片导通)
                voltageData.push(0);
            } else {
                voltageData.push(0);
            }
        }

        renderChart(timeLabels, voltageData, VIH, VIL, t1_ns, t2_ns, maxTime);
    }

    function renderChart(labels, vData, VIH, VIL, t1, t2, maxTime) {
        const ctx = document.getElementById('i2cChart').getContext('2d');
        const accentPink = getCssVar('--accent-pink') || '#f4a298';
        const tickColor = getCssVar('--chart-tick') || '#8c8c9b';
        const gridColor = getCssVar('--chart-grid') || '#2a2a32';
        const thresholdColor = getCssVar('--chart-threshold') || 'rgba(255, 255, 255, 0.3)';
        const textMain = getCssVar('--text-main') || '#e8e8e8';
        const boxBg = getCssVar('--chart-box-bg') || 'rgba(244, 162, 152, 0.15)';
        const boxBorder = getCssVar('--chart-box-border') || 'rgba(244, 162, 152, 0.5)';
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '总线电平',
                    data: vData,
                    borderColor: accentPink,
                    borderWidth: 3,
                    pointRadius: 0,
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                layout: { padding: { top: 20, right: 40 } },
                scales: {
                    x: {
                        type: 'linear',
                        min: 0, max: maxTime,
                        grid: { display: false, color: gridColor },
                        ticks: { color: tickColor, callback: value => value + ' ns' }
                    },
                    y: {
                        min: 0, max: currentVdd * 1.2,
                        grid: { color: gridColor, drawBorder: false },
                        ticks: { color: tickColor, stepSize: currentVdd/4, callback: value => value.toFixed(2) + 'V' }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { mode: 'index', intersect: false },
                    annotation: {
                        annotations: {
                            // VIH 虚线
                            lineVih: {
                                type: 'line', yMin: VIH, yMax: VIH,
                                borderColor: thresholdColor, borderDash: [5, 5], borderWidth: 1,
                                label: { display: true, content: `VIH (${VIH.toFixed(2)}V)`, position: 'end', backgroundColor: 'transparent', color: textMain, yAdjust: -15 }
                            },
                            // VIL 虚线
                            lineVil: {
                                type: 'line', yMin: VIL, yMax: VIL,
                                borderColor: thresholdColor, borderDash: [5, 5], borderWidth: 1,
                                label: { display: true, content: `VIL (${VIL.toFixed(2)}V)`, position: 'end', backgroundColor: 'transparent', color: textMain, yAdjust: 15 }
                            },
                            // 上升沿计算区间高亮框 (Bounding Box)
                            boxTr: {
                                type: 'box',
                                xMin: t1, xMax: t2, yMin: VIL, yMax: VIH,
                                backgroundColor: boxBg,
                                borderColor: boxBorder,
                                borderWidth: 1
                            },
                            // 标注文字
                            labelTr: {
                                type: 'label',
                                xValue: (t1 + t2)/2,
                                yValue: VIL / 2,
                                content: `tr ≈ ${(t2-t1).toFixed(0)}ns`,
                                color: accentPink,
                                font: { size: 12, family: 'monospace' }
                            }
                        }
                    }
                }
            }
        });
    }

    // 初始化事件
    resSlider.addEventListener('input', updateSimulation);
    capSlider.addEventListener('input', updateSimulation);
    window.onload = () => {
        setupThemeSync();
        updateSimulation();
    };
</script>

</body>
</html>
