<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteHub Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #15161b;
      --panel: #1c1e25;
      --panel-2: #242734;
      --line: #343847;
      --text: #e8edf7;
      --muted: #98a2b3;
      --accent: #5b8cff;
      --accent-2: #f4a298;
      --radius: 12px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body { padding: 8px; }

    .shell {
      max-width: 640px;
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      overflow: hidden;
    }

    .header {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 6px 0 4px;
      font-size: 18px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .content {
      padding: 10px 12px 12px;
      display: grid;
      gap: 10px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 10px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 13px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--accent);
      background: rgba(91,140,255,0.12);
      border: 1px solid rgba(91,140,255,0.24);
    }

    .graph {
      height: 120px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background:
        linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px),
        #191b22;
      background-size: 40px 40px;
      position: relative;
      overflow: hidden;
    }

    .curve {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 18px;
      height: 58px;
      border-left: 3px solid var(--accent-2);
      border-bottom: 3px solid var(--accent-2);
      border-radius: 0 0 0 10px;
      transform-origin: left bottom;
      transition: transform 0.25s ease, height 0.25s ease;
    }

    .curve::before {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      border-top: 3px solid var(--accent-2);
      border-right: 3px solid var(--accent-2);
      border-radius: 0 10px 0 0;
      transform: translateY(-26px);
      opacity: 0.88;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .stat .value {
      font-size: 16px;
      font-weight: 800;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 64px 1fr 38px;
      gap: 8px;
      align-items: center;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .row .label {
      color: var(--muted);
      font-size: 11px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .pill {
      text-align: center;
      border-radius: 999px;
      padding: 4px 6px;
      font-size: 11px;
      background: #171922;
      border: 1px solid var(--line);
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .footnote {
      padding: 0 12px 12px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    @media (max-width: 560px) {
      body { padding: 6px; }
      .shell { border-radius: 12px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="header">
      <div class="eyebrow">public demo</div>
      <h1>NoteHub 示例演示页</h1>
      <p>一个尽量小的本地示例，用于在文档中演示 iframe 的最简交互效果。</p>
    </div>

    <div class="content">
      <section class="panel">
        <div class="panel-title">
          <span>演示区</span>
          <span class="badge" id="modeBadge">稳定</span>
        </div>
        <div class="graph" aria-hidden="true">
          <div class="curve" id="curve"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">
          <span>状态</span>
          <span class="badge">local</span>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="label">响应</div>
            <div class="value" id="responseValue">中</div>
          </div>
          <div class="stat">
            <div class="label">清晰度</div>
            <div class="value" id="clarityValue">清晰</div>
          </div>
        </div>
      </section>

      <section class="panel controls">
        <div class="panel-title">
          <span>参数</span>
          <span class="badge">轻量</span>
        </div>
        <div class="row">
          <div class="label">A</div>
          <input id="a" type="range" min="0" max="100" value="35">
          <div class="pill" id="aValue">35</div>
        </div>
        <div class="row">
          <div class="label">B</div>
          <input id="b" type="range" min="0" max="100" value="65">
          <div class="pill" id="bValue">65</div>
        </div>
        <div class="actions">
          <button type="button" id="toggle">切换状态</button>
          <button type="button" id="reset">重置</button>
        </div>
      </section>
    </div>

    <div class="footnote">说明：这个页面只保留最必要的示意内容，适合在文档中做 iframe 示例。</div>
  </main>

  <script>
    const a = document.getElementById('a');
    const b = document.getElementById('b');
    const aValue = document.getElementById('aValue');
    const bValue = document.getElementById('bValue');
    const modeBadge = document.getElementById('modeBadge');
    const responseValue = document.getElementById('responseValue');
    const clarityValue = document.getElementById('clarityValue');
    const curve = document.getElementById('curve');

    const update = () => {
      const av = Number(a.value);
      const bv = Number(b.value);
      aValue.textContent = av;
      bValue.textContent = bv;

      const mix = Math.round((av + bv) / 2);
      curve.style.transform = `scaleY(${0.85 + av / 220}) translateX(${bv / 10 - 3}px)`;
      curve.style.height = `${42 + mix / 2}px`;

      if (mix > 70) {
        modeBadge.textContent = '高响应';
        responseValue.textContent = '强';
        clarityValue.textContent = '紧凑';
      } else if (mix > 40) {
        modeBadge.textContent = '稳定';
        responseValue.textContent = '中';
        clarityValue.textContent = '清晰';
      } else {
        modeBadge.textContent = '低速';
        responseValue.textContent = '柔和';
        clarityValue.textContent = '宽松';
      }
    };

    document.getElementById('toggle').addEventListener('click', () => {
      a.value = a.value === '35' ? '82' : '35';
      b.value = b.value === '65' ? '24' : '65';
      update();
    });

    document.getElementById('reset').addEventListener('click', () => {
      a.value = '35';
      b.value = '65';
      update();
    });

    a.addEventListener('input', update);
    b.addEventListener('input', update);
    update();
  </script>
</body>
</html>
